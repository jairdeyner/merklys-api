server.port=${PORT:8081}

# Cofiguración de postgresql
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/merklys}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Cofiguración de jpa
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de JWT
app.jwt.secret=${JWT_SECRET:d5c59e0591c5b79cb28a3a17bc55cd138a5e4e0405573bd73b48172063cf1d61}
app.jwt.expiration=${JWT_EXPIRATION:3600000}
app.jwt.issuer=${JWT_ISSUER:merklys}
app.jwt.token-prefix=Bearer
app.jwt.header-name=Authorization

# Configuración de CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
